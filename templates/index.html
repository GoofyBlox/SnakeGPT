<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SnakeGPT AI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d0d10;
  --panel: #111114;
  --surface: #17171c;
  --surface2: #1e1e26;
  --surface3: #25252f;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --border3: rgba(255,255,255,0.15);
  --green: #00e676;
  --green2: #00c853;
  --green-glow: rgba(0,230,118,0.15);
  --green-dim: rgba(0,230,118,0.08);
  --blue: #40c4ff;
  --purple: #b388ff;
  --orange: #ffab40;
  --red: #ff5252;
  --text: #e8eaf0;
  --text2: #a0a3b1;
  --muted: #4a4d5e;
  --muted2: #2e3042;
  --sidebar-w: 256px;
  --radius: 10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  height: 100dvh;
  display: flex;
  overflow: hidden;
  font-size: 14px;
}

/* ─── SIDEBAR ─── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  z-index: 200;
}

.sb-head {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.logo-mark {
  width: 32px; height: 32px;
  background: var(--green-dim);
  border: 1px solid rgba(0,230,118,0.3);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 600;
  color: var(--green);
}

.logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.logo-text em { color: var(--green); font-style: normal; }
.logo-text small { font-size: 10px; font-weight: 500; color: var(--muted); margin-left: 2px; }

.new-btn {
  width: 100%;
  padding: 8px 12px;
  background: var(--green-dim);
  border: 1px solid rgba(0,230,118,0.2);
  border-radius: var(--radius);
  color: var(--green);
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s;
}
.new-btn:hover { background: rgba(0,230,118,0.14); border-color: rgba(0,230,118,0.35); }
.new-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

.sb-label {
  padding: 14px 16px 6px;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.8px; color: var(--muted);
  text-transform: uppercase;
}

#history-list {
  flex: 1; overflow-y: auto;
  padding: 4px 8px 8px;
}
#history-list::-webkit-scrollbar { width: 3px; }
#history-list::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

.h-item {
  padding: 7px 8px;
  border-radius: 7px;
  font-size: 12px; color: var(--text2);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  display: flex; align-items: center; gap: 7px;
  position: relative;
  animation: slideIn 0.18s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.h-item-icon { width: 13px; height: 13px; flex-shrink: 0; opacity: 0.35; }
.h-item-label {
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-size: 12px;
}
.h-item-label input {
  width: 100%; background: none; border: none; outline: none;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 12px; padding: 0;
}
.h-item-actions {
  display: none; align-items: center; gap: 2px; flex-shrink: 0;
}
.h-item:hover .h-item-actions { display: flex; }
.h-item.active .h-item-actions { display: flex; }
.h-act {
  width: 22px; height: 22px;
  background: none; border: none;
  border-radius: 5px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.5; transition: opacity 0.12s, background 0.12s;
}
.h-act:hover { opacity: 1; background: var(--surface3); }
.h-act.del:hover { color: var(--red); }
.h-act svg { width: 12px; height: 12px; }
.h-item:hover { background: var(--surface); color: var(--text); }
.h-item:hover .h-item-icon { opacity: 0.6; }
.h-item.active { background: var(--green-dim); color: var(--green); }
.h-item.active .h-item-icon { opacity: 0.8; }
.h-item.deleting { animation: fadeOut 0.2s ease forwards; }
@keyframes fadeOut { to{opacity:0;transform:translateX(-10px);max-height:0;padding:0;margin:0} }

.sb-foot {
  padding: 12px;
  border-top: 1px solid var(--border);
}

.model-card {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
}
.pulse { width: 8px; height: 8px; background: var(--green); border-radius: 50%; flex-shrink: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.4)} 50%{box-shadow:0 0 0 4px rgba(0,230,118,0)} }
.model-info .name { font-size: 11px; font-weight: 600; color: var(--text); }
.model-info .sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

/* ─── OVERLAY ─── */
#overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 199;
  backdrop-filter: blur(2px);
}

/* ─── MAIN ─── */
#main {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
}

/* topbar mobile */
#topbar {
  display: none;
  align-items: center; gap: 12px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  flex-shrink: 0;
}
.tb-icon {
  width: 32px; height: 32px;
  background: none; border: 1px solid var(--border2);
  border-radius: 7px; color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}
.tb-icon svg { width: 16px; height: 16px; }
.tb-logo { font-size: 14px; font-weight: 700; }
.tb-logo em { color: var(--green); font-style: normal; }
.tb-new {
  margin-left: auto;
  width: 30px; height: 30px;
  background: var(--green-dim);
  border: 1px solid rgba(0,230,118,0.25);
  border-radius: 7px;
  color: var(--green); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; line-height: 1;
  font-family: 'Inter', sans-serif;
}

/* ─── CHAT + PREVIEW SPLIT ─── */
#workspace {
  flex: 1; display: flex; min-height: 0;
}

#chat-pane {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
}

/* preview panel */
#preview-pane {
  width: 0;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: width 0.3s cubic-bezier(.4,0,.2,1);
  flex-shrink: 0;
}
#preview-pane.open { width: 45%; }

.preview-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  background: var(--panel);
  flex-shrink: 0;
}
.preview-title {
  font-size: 12px; font-weight: 600; color: var(--text2);
  display: flex; align-items: center; gap: 6px;
}
.preview-title svg { width: 14px; height: 14px; color: var(--green); }
.preview-actions { margin-left: auto; display: flex; gap: 6px; }
.p-btn {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  font-size: 11px; font-weight: 500; color: var(--text2);
  cursor: pointer; transition: all 0.12s;
  font-family: 'Inter', sans-serif;
}
.p-btn:hover { color: var(--text); border-color: var(--border3); }
.p-btn.danger:hover { color: var(--red); border-color: rgba(255,82,82,0.4); }

#preview-frame {
  flex: 1;
  border: none;
  background: #fff;
}

/* ─── CHAT ─── */
#chat {
  flex: 1; overflow-y: auto;
  padding: 24px 0;
  scroll-behavior: smooth;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

.chat-inner {
  max-width: 720px; margin: 0 auto;
  padding: 0 20px;
  display: flex; flex-direction: column; gap: 20px;
}

/* empty */
#empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 58vh; text-align: center; gap: 10px; padding: 20px;
}

.empty-icon {
  width: 64px; height: 64px;
  background: var(--green-dim);
  border: 1px solid rgba(0,230,118,0.25);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  margin-bottom: 6px;
}

.empty-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.empty-title em { color: var(--green); font-style: normal; }
.empty-sub { font-size: 13px; color: var(--text2); max-width: 320px; line-height: 1.6; }

.sugs {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-top: 16px;
  width: 100%; max-width: 460px;
}
.sug {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 11px 13px;
  font-family: 'Inter', sans-serif;
  font-size: 12px; color: var(--text2);
  cursor: pointer; text-align: left; line-height: 1.45;
  transition: all 0.12s;
}
.sug:hover { border-color: rgba(0,230,118,0.35); background: var(--green-dim); color: var(--text); }
.sug b { display: block; color: var(--green); font-size: 10px; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

/* messages */
.msg { display: flex; gap: 12px; animation: rise 0.2s ease; }
@keyframes rise { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction: row-reverse; }

.av {
  width: 30px; height: 30px; border-radius: 7px;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
  font-family: 'JetBrains Mono', monospace;
}
.msg.user .av { background: var(--green); color: #000; font-size: 12px; }
.msg.ai .av { background: var(--surface2); color: var(--blue); border: 1px solid var(--border2); }

.bubble {
  max-width: min(74%, 620px);
  padding: 11px 15px;
  border-radius: 12px;
  font-size: 14px; line-height: 1.65;
}
.msg.user .bubble {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-top-right-radius: 3px;
  color: var(--text);
}
.msg.ai .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top-left-radius: 3px;
}

/* markdown */
.bubble p { margin-bottom: 9px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble strong { font-weight: 600; color: #fff; }
.bubble em { color: var(--text2); }
.bubble a { color: var(--blue); text-decoration: none; }
.bubble a:hover { text-decoration: underline; }
.bubble code {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  background: var(--surface3); padding: 2px 6px;
  border-radius: 4px; color: var(--purple);
}
.bubble pre {
  margin: 10px 0; border-radius: 10px;
  overflow: hidden; border: 1px solid var(--border2);
  position: relative;
}
.bubble pre code { background: none; padding: 0; color: inherit; font-size: 12.5px; border-radius: 0; }
.bubble pre .hljs { padding: 14px 16px; line-height: 1.6; }
.bubble ul,.bubble ol { padding-left: 20px; margin-bottom: 9px; }
.bubble li { margin-bottom: 4px; }
.bubble h1,.bubble h2,.bubble h3 { font-weight: 600; margin: 14px 0 6px; }
.bubble h1 { font-size: 17px; color: var(--text); }
.bubble h2 { font-size: 15px; color: var(--text); }
.bubble h3 { font-size: 14px; color: var(--text2); }
.bubble blockquote { border-left: 3px solid var(--green); padding-left: 12px; color: var(--text2); margin: 8px 0; font-style: italic; }
.bubble table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
.bubble th { background: var(--surface2); padding: 8px 12px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border2); }
.bubble td { padding: 7px 12px; border-bottom: 1px solid var(--border); }
.bubble hr { border: none; border-top: 1px solid var(--border2); margin: 12px 0; }

/* code block toolbar */
.code-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 12px;
  background: var(--surface3);
  border-bottom: 1px solid var(--border2);
}
.code-lang { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
.code-actions { display: flex; gap: 6px; }
.code-btn {
  padding: 3px 9px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text2); font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 500;
  border-radius: 5px; cursor: pointer; transition: all 0.12s;
}
.code-btn:hover { color: var(--text); border-color: var(--border3); }
.code-btn.preview-trigger { color: var(--green); border-color: rgba(0,230,118,0.3); }
.code-btn.preview-trigger:hover { background: var(--green-dim); }

/* thinking */
.thinking { display: flex; gap: 5px; align-items: center; padding: 8px 0; }
.dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: blink 1.4s infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes blink { 0%,80%,100%{opacity:0.12} 40%{opacity:1} }

/* ─── INPUT ─── */
#input-wrap {
  padding: 12px 20px 16px;
  background: var(--panel);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-box {
  max-width: 720px; margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 13px;
  padding: 11px 12px;
  display: flex; gap: 8px; align-items: flex-end;
  transition: border-color 0.2s;
}
.input-box:focus-within { border-color: rgba(0,230,118,0.35); }

#input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; resize: none;
  min-height: 22px; max-height: 130px; line-height: 1.55;
}
#input::placeholder { color: var(--muted); }

#send {
  width: 34px; height: 34px; flex-shrink: 0;
  background: var(--green); border: none; border-radius: 8px;
  color: #000; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s;
}
#send svg { width: 16px; height: 16px; }
#send:hover { opacity: 0.85; }
#send:active { transform: scale(0.93); }
#send:disabled { opacity: 0.2; cursor: not-allowed; }

.input-hint { text-align: center; font-size: 10px; color: var(--muted); margin-top: 7px; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  #sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); box-shadow: 8px 0 32px rgba(0,0,0,0.5); }
  #overlay.show { display: block; }
  #topbar { display: flex; }
  #preview-pane.open { width: 100%; position: fixed; inset: 0; z-index: 150; }
  .sugs { grid-template-columns: 1fr; max-width: 100%; }
  .bubble { max-width: 88%; font-size: 13px; }
  .chat-inner { padding: 0 12px; }
  #input-wrap { padding: 10px 12px 14px; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-head">
    <div class="logo">
      <div class="logo-mark">&gt;_</div>
      <div class="logo-text">Snake<em>GPT</em> <small>AI</small></div>
    </div>
    <button class="new-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      New chat
    </button>
  </div>
  <div class="sb-label">Recent</div>
  <div id="history-list"></div>
  <div class="sb-foot">
    <div class="model-card">
      <div class="pulse"></div>
      <div class="model-info">
        <div class="name">LLaMA 3.3 70B</div>
        <div class="sub">Groq · Free · Fast</div>
      </div>
    </div>
  </div>
</div>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div id="main">

  <div id="topbar">
    <button class="tb-icon" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="tb-logo">Snake<em>GPT</em> AI</div>
    <button class="tb-new" onclick="newChat()">+</button>
  </div>

  <div id="workspace">

    <!-- CHAT PANE -->
    <div id="chat-pane">
      <div id="chat">
        <div class="chat-inner" id="chat-inner">
          <div id="empty">
            <div class="empty-icon">🐍</div>
            <div class="empty-title">Snake<em>GPT</em> AI</div>
            <div class="empty-sub">Elite AI code assistant. Write, debug, explain — and preview HTML/CSS/JS live.</div>
            <div class="sugs">
              <button class="sug" onclick="suggest(this)"><b>Generate</b>Write a Python web scraper</button>
              <button class="sug" onclick="suggest(this)"><b>Explain</b>How does async/await work?</button>
              <button class="sug" onclick="suggest(this)"><b>Preview</b>Make a cool CSS animation</button>
              <button class="sug" onclick="suggest(this)"><b>Debug</b>Fix the errors in my code</button>
            </div>
          </div>
        </div>
      </div>

      <div id="input-wrap">
        <div class="input-box">
          <textarea id="input" placeholder="Ask SnakeGPT anything about code..." rows="1"></textarea>
          <button id="send" onclick="sendMsg()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
      </div>
    </div>

    <!-- PREVIEW PANE -->
    <div id="preview-pane">
      <div class="preview-head">
        <div class="preview-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9l3 3-3 3M13 15h3"/></svg>
          Live Preview
        </div>
        <div class="preview-actions">
          <button class="p-btn" onclick="refreshPreview()" title="Refresh">↺ Refresh</button>
          <button class="p-btn danger" onclick="closePreview()">✕ Close</button>
        </div>
      </div>
      <iframe id="preview-frame" sandbox="allow-scripts"></iframe>
    </div>

  </div>
</div>

<script>
  const chatInner = document.getElementById('chat-inner');
  const chatEl = document.getElementById('chat');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const previewPane = document.getElementById('preview-pane');
  const previewFrame = document.getElementById('preview-frame');

  let history = [];
  let sessions = [];
  let currentTitle = null;
  let lastPreviewCode = '';

  try { sessions = JSON.parse(localStorage.getItem('sgpt_sessions') || '[]'); } catch(e) {}

  marked.setOptions({ breaks: true });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  const isMobile = () => 'ontouchstart' in window || window.innerWidth <= 768;

  function suggest(btn) {
    const b = btn.querySelector('b');
    inputEl.value = btn.textContent.replace(b ? b.textContent : '', '').trim();
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
    if (!isMobile()) inputEl.focus();
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  function newChat() {
    history = []; currentTitle = null;
    chatInner.innerHTML = `<div id="empty">
      <div class="empty-icon">🐍</div>
      <div class="empty-title">Snake<em>GPT</em> AI</div>
      <div class="empty-sub">Elite AI code assistant. Write, debug, explain — and preview HTML/CSS/JS live.</div>
      <div class="sugs">
        <button class="sug" onclick="suggest(this)"><b>Generate</b>Write a Python web scraper</button>
        <button class="sug" onclick="suggest(this)"><b>Explain</b>How does async/await work?</button>
        <button class="sug" onclick="suggest(this)"><b>Preview</b>Make a cool CSS animation</button>
        <button class="sug" onclick="suggest(this)"><b>Debug</b>Fix the errors in my code</button>
      </div></div>`;
    closePreview();
    closeSidebar();
  }

  function removeEmpty() { const e = document.getElementById('empty'); if(e) e.remove(); }

  // detect language from highlight.js class
  function getLang(block) {
    const cls = [...block.classList].find(c => c.startsWith('language-'));
    return cls ? cls.replace('language-', '') : '';
  }

  // only HTML triggers preview button
  function isPreviewable(lang) {
    const l = lang.toLowerCase();
    return ['html', 'htm'].includes(l);
  }

  // collect ALL css + js blocks from the same AI message bubble
  function buildFullPreview(htmlCode, bubble) {
    // extract css blocks
    const cssBlocks = [];
    const jsBlocks = [];
    bubble.querySelectorAll('pre code').forEach(block => {
      const lang = getLang(block).toLowerCase();
      const src = block.textContent;
      if (lang === 'css') cssBlocks.push(src);
      if (lang === 'js' || lang === 'javascript') jsBlocks.push(src);
    });

    let base = htmlCode;

    // inject collected CSS before </head> or at top
    if (cssBlocks.length) {
      const styleTag = '<style>\n' + cssBlocks.join('\n') + '\n</style>';
      if (base.includes('</head>')) {
        base = base.replace('</head>', styleTag + '\n</head>');
      } else {
        base = styleTag + '\n' + base;
      }
    }

    // inject collected JS before </body> or at bottom
    if (jsBlocks.length) {
      const scriptTag = '<script>\n' + jsBlocks.join('\n') + '\n<\/script>';
      if (base.includes('</body>')) {
        base = base.replace('</body>', scriptTag + '\n</body>');
      } else {
        base = base + '\n' + scriptTag;
      }
    }

    return base;
  }

  function openPreview(htmlCode, bubble) {
    lastPreviewCode = buildFullPreview(htmlCode, bubble);
    previewPane.classList.add('open');
    previewFrame.srcdoc = lastPreviewCode;
  }

  function refreshPreview() {
    const tmp = lastPreviewCode;
    previewFrame.srcdoc = '';
    setTimeout(() => { previewFrame.srcdoc = tmp; }, 50);
  }

  function closePreview() {
    previewPane.classList.remove('open');
    previewFrame.srcdoc = '';
    lastPreviewCode = '';
  }

  function addMsg(role, content) {
    removeEmpty();
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const av = document.createElement('div');
    av.className = 'av';
    av.textContent = role === 'user' ? 'U' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'ai') {
      bubble.innerHTML = marked.parse(content);

      bubble.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
        const lang = getLang(block);
        const code = block.textContent;
        const pre = block.parentElement;

        // build toolbar
        const toolbar = document.createElement('div');
        toolbar.className = 'code-toolbar';

        const langLabel = document.createElement('span');
        langLabel.className = 'code-lang';
        langLabel.textContent = lang || 'code';

        const actions = document.createElement('div');
        actions.className = 'code-actions';

        // copy btn
        const copyBtn = document.createElement('button');
        copyBtn.className = 'code-btn';
        copyBtn.textContent = 'Copy';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(code);
          copyBtn.textContent = 'Copied!';
          setTimeout(() => copyBtn.textContent = 'Copy', 1500);
        };
        actions.appendChild(copyBtn);

        // preview btn — only for html/css/js
        if (isPreviewable(lang)) {
          const prevBtn = document.createElement('button');
          prevBtn.className = 'code-btn preview-trigger';
          prevBtn.textContent = '▶ Preview';
          prevBtn.onclick = () => openPreview(code, bubble.closest('.bubble') || bubble);
          actions.appendChild(prevBtn);
        }

        toolbar.appendChild(langLabel);
        toolbar.appendChild(actions);
        pre.insertBefore(toolbar, pre.firstChild);
      });
    } else {
      bubble.textContent = content;
    }

    msg.appendChild(av);
    msg.appendChild(bubble);
    chatInner.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addThinking() {
    removeEmpty();
    const msg = document.createElement('div');
    msg.className = 'msg ai'; msg.id = 'thinking';
    const av = document.createElement('div'); av.className = 'av'; av.textContent = 'AI';
    const b = document.createElement('div'); b.className = 'bubble';
    b.innerHTML = '<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    msg.appendChild(av); msg.appendChild(b);
    chatInner.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function saveSession(title) {
    try {
      const idx = sessions.findIndex(s => s.title === title);
      const s = { title, history, time: Date.now() };
      if (idx >= 0) sessions[idx] = s; else sessions.unshift(s);
      if (sessions.length > 30) sessions = sessions.slice(0, 30);
      localStorage.setItem('sgpt_sessions', JSON.stringify(sessions));
      renderHistory();
    } catch(e) {}
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    sessions.forEach((s, idx) => {
      const item = document.createElement('div');
      item.className = 'h-item' + (s.title === currentTitle ? ' active' : '');

      item.innerHTML = `
        <svg class="h-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <div class="h-item-label"><span class="h-title">${s.title}</span></div>
        <div class="h-item-actions">
          <button class="h-act ren" title="Rename">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="h-act del" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>`;

      // load session on click (not on action buttons)
      item.addEventListener('click', (e) => {
        if (e.target.closest('.h-act')) return;
        history = s.history; currentTitle = s.title;
        chatInner.innerHTML = '';
        history.forEach(m => addMsg(m.role === 'assistant' ? 'ai' : 'user', m.content));
        renderHistory(); closeSidebar();
      });

      // rename
      item.querySelector('.ren').addEventListener('click', (e) => {
        e.stopPropagation();
        const labelEl = item.querySelector('.h-title');
        const oldTitle = s.title;
        const input = document.createElement('input');
        input.value = oldTitle;
        input.onclick = e2 => e2.stopPropagation();
        input.onblur = input.onkeydown = (ev) => {
          if (ev.type === 'keydown' && ev.key !== 'Enter') return;
          const newTitle = input.value.trim() || oldTitle;
          sessions[idx].title = newTitle;
          if (currentTitle === oldTitle) currentTitle = newTitle;
          try { localStorage.setItem('sgpt_sessions', JSON.stringify(sessions)); } catch(_) {}
          renderHistory();
        };
        labelEl.replaceWith(input);
        input.focus(); input.select();
      });

      // delete
      item.querySelector('.del').addEventListener('click', (e) => {
        e.stopPropagation();
        item.classList.add('deleting');
        setTimeout(() => {
          if (currentTitle === s.title) {
            currentTitle = null; history = [];
            chatInner.innerHTML = \`<div id="empty">
              <div class="empty-icon">🐍</div>
              <div class="empty-title">Snake<em>GPT</em> AI</div>
              <div class="empty-sub">Elite AI code assistant. Write, debug, explain — and preview HTML/CSS/JS live.</div>
              <div class="sugs">
                <button class="sug" onclick="suggest(this)"><b>Generate</b>Write a Python web scraper</button>
                <button class="sug" onclick="suggest(this)"><b>Explain</b>How does async/await work?</button>
                <button class="sug" onclick="suggest(this)"><b>Preview</b>Make a cool CSS animation</button>
                <button class="sug" onclick="suggest(this)"><b>Debug</b>Fix the errors in my code</button>
              </div></div>\`;
            closePreview();
          }
          sessions.splice(idx, 1);
          try { localStorage.setItem('sgpt_sessions', JSON.stringify(sessions)); } catch(_) {}
          renderHistory();
        }, 200);
      });

      list.appendChild(item);
    });
  }

  async function sendMsg() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    addThinking();

    if (!currentTitle) currentTitle = text.slice(0, 42) + (text.length > 42 ? '…' : '');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      document.getElementById('thinking')?.remove();
      if (data.error) {
        addMsg('ai', `**Error:** ${data.error}`);
      } else {
        addMsg('ai', data.reply);
        history.push({ role: 'assistant', content: data.reply });
        saveSession(currentTitle);
      }
    } catch(e) {
      document.getElementById('thinking')?.remove();
      addMsg('ai', '**Connection error.** Please try again.');
    }

    sendBtn.disabled = false;
    if (!isMobile()) inputEl.focus();
  }

  renderHistory();
</script>
</body>
</html>
